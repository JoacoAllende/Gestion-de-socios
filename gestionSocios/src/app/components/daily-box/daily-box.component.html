<div class="buttons-wrapper">
  <app-month-selector [anio]="anio" [showMonth]="false" (change)="onYearChange($event)">
  </app-month-selector>
  <app-button [text]="'Nuevo Movimiento'" [onClick]="createMovement">
  </app-button>
  <app-button [text]="'Descargar CSV'" [onClick]="exportCsv">
  </app-button>
</div>
<app-ag-table [rowData]="rowData" [colDefs]="colDefs" [defaultColDef]="defaultColDef"
  [gridStyle]="gridStyle"
  (gridReadyEvent)="onGridReady($event)">
</app-ag-table>
